<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scan by Arxeni Hub</title>
    <link rel="stylesheet" href="/hub.css" />
  </head>
  <body>
    <main class="hub-shell" data-preset="minimal">
      <section class="hub-card">
        <p class="eyebrow">Scan by Arxeni</p>
        <h1>QR Hub</h1>
        <p class="hub-copy">Choose a destination from this QR code.</p>
        <div id="hub-links" class="hub-links"></div>
        <p id="hub-empty" class="hub-empty" hidden>No destinations were added to this QR Hub.</p>
      </section>
    </main>
    <script src="/hub.js"></script>
  </body>
</html>
